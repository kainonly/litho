<form nz-form nzLayout="vertical" id="form" [formGroup]="form" (appSubmit)="submit($event)">
  <nz-form-item>
    <nz-form-label nzRequired>产品名称</nz-form-label>
    <nz-form-control nzHasFeedback [nzAutoTips]="tips.name">
      <input nz-input formControlName="name" placeholder="请输入产品名称" />
    </nz-form-control>
  </nz-form-item>
  <nz-form-item>
    <nz-form-label>描述</nz-form-label>
    <nz-form-control>
      <textarea
        nz-input
        formControlName="description"
        placeholder="请输入产品描述"
        [nzAutosize]="{ minRows: 2, maxRows: 4 }"
      ></textarea>
    </nz-form-control>
  </nz-form-item>
  <nz-form-item>
    <nz-form-label nzRequired>价格</nz-form-label>
    <nz-form-control nzHasFeedback [nzAutoTips]="tips.price">
      <nz-input-number
        formControlName="price"
        [nzMin]="0.01"
        [nzStep]="0.01"
        [nzPrecision]="2"
        [style.width.%]="100"
        placeholder="请输入价格"
      ></nz-input-number>
    </nz-form-control>
  </nz-form-item>
  <nz-form-item>
    <nz-form-label nzRequired>库存</nz-form-label>
    <nz-form-control nzHasFeedback [nzAutoTips]="tips.stock">
      <nz-input-number
        formControlName="stock"
        [nzMin]="0"
        [nzStep]="1"
        [nzPrecision]="0"
        [style.width.%]="100"
        placeholder="请输入库存数量"
      ></nz-input-number>
    </nz-form-control>
  </nz-form-item>
  <nz-form-item>
    <nz-form-label>缩略图</nz-form-label>
    <nz-form-control>
      <input nz-input formControlName="thumbnail" placeholder="请输入缩略图 URL" />
      @if (form.value.thumbnail) {
        <div style="margin-top: 8px">
          <img
            [src]="form.value.thumbnail"
            alt="缩略图预览"
            style="max-width: 100%; max-height: 120px; object-fit: contain"
          />
        </div>
      }
    </nz-form-control>
  </nz-form-item>
  <nz-form-item>
    <nz-form-label nzRequired>状态</nz-form-label>
    <nz-form-control>
      <nz-switch formControlName="status" nzCheckedChildren="上架" nzUnCheckedChildren="下架"></nz-switch>
    </nz-form-control>
  </nz-form-item>
</form>

<div *nzModalFooter>
  <button nz-button type="button" nzType="default" (click)="close()">取消</button>
  <button nz-button nzType="primary" form="form" [disabled]="!form.valid">提交</button>
</div>
